	// resource switch 1
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = GasContainerContents12R
		baseVolume = 25000.0
		switcherDescription = Tank Contents

		SUBTYPE
		{
			name = LiquidFuel
