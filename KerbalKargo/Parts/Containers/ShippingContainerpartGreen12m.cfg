PART
{
	// basic information
	// identifier
	name = KerbalKargoShippingContainer12m
	module = Part
	author = lightningstruckkerbonaut
	TechRequired = largeVolumeContainment
	entryCost = 7500
	cost = 5000
	category = Cargo
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/ShippingContainerGreen
		position = 0.0, 0.0, 0.0
		scale = 1,1,1
		rotation = 0, 90, -90
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = SC-12 Shipping Container
	manufacturer = Kerbal Kargo Inc
	description = A 2.5 by 12m rectangular container for storing large amounts of cargo or resources. The researchers at Kerbal Kargo decided that adding ridges to the walls to make it more stylish would be worth it.
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,0,1,1,0
	bulkheadProfiles = size2
	// information
	mass = 2.2
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 1600
	skinMaxTemp = 2400
	tags = shipping box container cargo green kerbalkargo Kerbalkargo KerbalKargo SC-12
	breakingForce = 210
	breakingTorque = 210
	// node stuff here. note: i am pretty sure that since the cfg applies rotation to the model, x is width, y is length, z is height (probably)
	// definition format is Position X, Position Y, Position Z, Up X, Up Y, Up Z
	node_stack_bottom = 0.0, 0.0, -1.25, 0.0, 0.0, -1.0, 2
	node_stack_top = 0.0, 0.0, 1.25, 0.0, 0.0, 1.0, 2
	node_stack_front = 0.0, 6.02, 0.0, 0.0, 1.0, 0.0, 2
	node_stack_back = 0.0, -6.02, 0.0, 0.0, -1.0, 0.0, 2
	node_attach = 0.0, 0.0, 1.25, 0.0, 0.0, 1.0, 1
	MODULE
    {

        name = ModuleInventoryPart      
        InventorySlots = 25
        packedVolumeLimit = 20500

    } 

	// this is the color switch part
	
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = ShippingContainerColors12m
		switcherDescription = Container Color

		SUBTYPE
		{
			name = greenshippingcontainer12m
			title = Green
			primaryColor = #537439
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/GreenContainer
			}
		}

		SUBTYPE
		{
			name = grayshippingcontainer12m
			title = Gray
			primaryColor = #808080
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontainergray
			}
		}

		SUBTYPE
		{
			name = brownshippingcontainer12m
			title = Brown
			primaryColor = #9b7936
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontainerbrown
			}
		}

		SUBTYPE
		{
			name = blueshippingcontainer12m
			title = Blue
			primaryColor = #366f9b
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontainerblue
			}
		}

		SUBTYPE
		{
			name = redshippingcontainer12m
			title = Red
			primaryColor = #FF0000
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontainerred
			}
		}

		SUBTYPE
		{
			name = orangeshippingcontainer12m
			title = Orange
			primaryColor = #FFA500
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontainerorange
			}
		}

		SUBTYPE
		{
			name = yellowshippingcontainer12m
			title = Yellow
			primaryColor = #cfc838
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/sccontaineryellow
			}
		}
	}

	// this is the resource switch part

	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = ShippingContainerContents
		baseVolume = 20500.0
		switcherDescription = Container Contents
		
		SUBTYPE
		{
			name = Cargo
			title = Cargo
			tankType = KerbalKargoStructural
			addedMass = 0
			addedCost = 0
			// makes inventory have full capacity again
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 20500
					InventorySlots = 25
				}
			}
		}

		SUBTYPE
		{
			name = Ore
			title = Ore Container
			tankType = KerbalKargoOreContainer
			addedMass = 0
			addedCost = 500
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 0
					InventorySlots = 0
				}
			}
		}
	}
}

B9_TANK_TYPE
{
	name = KerbalKargoOreContainer
	title = KerbalKargoOreContainer
	tankMass = 0
	tankCost = 0

	RESOURCE
	{
		name = Ore
		unitsPerVolume = 0.5
	}
}
B9_TANK_TYPE
{
	name = KerbalKargoStructural
	title = KerbalKargoStructural
	tankMass = 0
	tankCost = 0
}