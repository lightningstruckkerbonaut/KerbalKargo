	cost = 1000
	category = FuelTank
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/frameless
		position = 0.0, 0.0, 0.0
		scale = 1,1,1
		rotation = 0, -90, 0
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = GC-03 Fluid Tank
	manufacturer = Kerbal Kargo Inc
	description = A 1.25 by 3m cylindrical fluid tank. Unlike its larger variants, the GC-03 does not have a frame, instead being supported by struts, due to its reduced size, and so, lack of need for one. Kerbal Kargo engineers believe this will only raise failure chance by 99.9%. Unfortunately, this means it cannot be attached to from the sides, but it can attach radially.
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,1,1,1,0
	bulkheadProfiles = size1
	// information
	mass = 0.75
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 1600
	skinMaxTemp = 2400
	tags = shipping tank container cargo kerbalkargo Kerbalkargo KerbalKargo fluid GC-03
	breakingForce = 210
	breakingTorque = 210
