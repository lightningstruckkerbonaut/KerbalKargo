PART
{
	// basic information
	// identifier
	name = KerbalKargoCompactContainer1m
	module = Part
	author = lightningstruckkerbonaut
	TechRequired = generalConstruction
	entryCost = 2500
	cost = 750
	category = Cargo
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/CC03compactcontainer
		position = 0.0, 0.0, 0.0
		scale = 0.9615,0.5,0.9615
		rotation = 0, -90, 0
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = CC-01 Compact Container
	manufacturer = Kerbal Kargo Inc
	description = A 1.25 by 1.25 octagonal container for storing medium amounts of cargo or resources. The researchers at Kerbal Kargo had to make an exceedingly difficult choice: developing smaller containers, because the public was protesting outside the KK headquarters chanting 'Bigger is not always better!'
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,1,1,1,0
	bulkheadProfiles = size2
	// information
	mass = 0.25
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 1600
	skinMaxTemp = 2400
	tags = shipping box container cargo short kerbalkargo Kerbalkargo KerbalKargo CC-01 CC
	breakingForce = 210
	breakingTorque = 210
	// node stuff here. y for length, xz for width or height im pretty sure
	// definition format is Position X, Position Y, Position Z, Up X, Up Y, Up Z
	node_stack_bottom = 0.0, 0.0, -0.62, 0.0, 0.0, -1.0, 1
	node_stack_top = 0.0, 0.0, 0.62, 0.0, 0.0, 1.0, 1
	node_stack_front = 0.0, 0.625, 0.0, 0.0, 1.0, 0.0, 1
	node_stack_back = 0.0, -0.625, 0.0, 0.0, -1.0, 0.0, 1
	node_attach = 0.0, 0.0, 0.62, 0.0, 0.0, -1.0, 1
	MODULE
    {

        name = ModuleInventoryPart      
        InventorySlots = 9
        packedVolumeLimit = 2000

    } 
	//color switch
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = CC01colorswitch
		switcherDescription = Container Color
		
		SUBTYPE
		{
			name = CC01Green
			title = Green
			primaryColor = #537439
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/container125green
			}
		}
		
		SUBTYPE
		{
			name = CC01Red
			title = Red
			primaryColor = #FF0000
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCRed
			}
		}

		SUBTYPE
		{
			name = CC01Blue
			title = Blue
			primaryColor = #366f9b
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCBlue
			}
		}

		SUBTYPE
		{
			name = CC01Orange
			title = Orange
			primaryColor = #FFA500
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCOrange
			}
		}

		SUBTYPE
		{
			name = CC01Yellow
			title = Yellow
			primaryColor = #cfc838
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCYellow
			}
		}

		SUBTYPE
		{
			name = CC01Brown
			title = Brown
			primaryColor = #9b7936
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCBrown
			}
		}

		SUBTYPE
		{
			name = CC01Gray
			title = Gray
			primaryColor = #808080
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCGray
			}
		}
	}
	//resource switch
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = CCResourceSwitch01
		switcherDescription = Container Contents
		baseVolume = 2000

		SUBTYPE
		{
			name = CC01Empty
			title = Cargo
			tankType = KerbalKargoStructural
			addedMass = 0
			addedCost = 0
			// makes inventory have full capacity again
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 2000
					InventorySlots = 9
				}
			}
		}
		// MODULE is just MODULE, Identifier shows which module its gonna modify, and DATA actually has the data thats gonna be the substitute, in this case it replaces the packed volume limit and inventory slots (9 and 2000) with 0 and 0
		SUBTYPE
		{
			name = CC01Ore
			title = Ore
			tankType = KerbalKargoOreContainer
			addedMass = 0
			addedCost = 250
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 0
					InventorySlots = 0
				}
			}
		}
	}
}