PART:NEEDS[CommunityResourcePack]
{
	// This part is meant to only be accessible ingame if the player has CRP. This part was made to solve the rc 06 issue of not having a use for the radioactive materials. 
	// basic information
	// identifier
	name = KerbalKargoNPCNUK25
	module = Part
	author = lightningstruckkerbonaut
	TechRequired = experimentalElectrics
	entryCost = 1750000
	cost = 558650
	category = Electrical
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/reactor
		position = 0.0, 0.0, 0.0
		scale = 1,1,1
		rotation = 0, 180, 0
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = NP-C-NUK-25 Nuclear Reactor
	manufacturer = Kerbal Kargo Inc
	description = A prime example of Kerbin's most advanced, powerful and efficient power generation technology available, the NP-C-NUK-25 is a containerized nuclear fission reactor, generating ludicrous amounts of electric charge through a chain reaction of splitting enriched uranium, which generates extremely large amounts of heat, used to boil water and spin a turbine. Well that doesn't seem too advanced in retrospect... it is just a fancier way of boiling water to spin a turbine... oh well. <color=#f90613><b>WARNING:</b> Exceeding temperatures of 2000K may result in a ''runaway meltdown''.</color>
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,0,1,1,0
	bulkheadProfiles = size2
	// information
	mass = 3.25
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 2000
	skinMaxTemp = 2400
	tags = shipping nuclear reactor cargo power kerbalkargo Kerbalkargo KerbalKargo radioactive NP-C-NUK-25 electricity electric
	breakingForce = 210
	breakingTorque = 210
	// node stuff here. note: i am pretty sure that since the cfg applies rotation to the model, x is width, y is length, z is height (probably)
	// definition format is Position X wide, Position Y up, Position Z long, Up X, Up Y, Up Z
	node_stack_bottom = 0.0, 0.0, -1.235, 0.0, 0.0, -1.0, 2
	node_stack_top = 0.0, 0.0, 1.235, 0.0, 0.0, 1.0, 2
	node_stack_front = 0.0, 3.0, 0.0, 0.0, 1.0, 0.0, 2
	node_stack_back = 0.0, -3.0, 0.0, 0.0, -1.0, 0.0, 2
	node_attach = 0.0, 0.0, 1.25, 0.0, 0.0, 1.0, 1
	
	RESOURCE
	{
		name = EnrichedUranium
		amount = 0
		maxAmount = 10
	}
	RESOURCE
	{
		name = DepletedFuel
		amount = 0
		maxAmount = 10
	}
    
    MODULE
    {
        name = ModuleOverheatDisplay
    }
    
    MODULE
    {
        name = ModuleResourceConverter
        ConverterName = Nuclear Reactor
        StartActionName = Start Reactor
        StopActionName = Shut Down Reactor
        ToggleActionName = Toggle Reactor
        FillAmount = 1.0
        AutoShutdown = true
        GeneratesHeat = true
        TemperatureModifier
        {
            key = 0 90000 0 0
            key = 750 50000 0 0
            key = 1250 12500 0 0
            key = 2000 17500 0 0  
            key = 3000 35000 0 0  
            key = 4000 100000 0 0
        } 
        DefaultShutoffTemp = 0.6 //Im pretty sure this refers to skin max temp it should shut down at 2400x0.6 which is 1440
        ThermalEfficiency
        {
            key = 0 0.1 0 0
            key = 500 0.2 0 0
            key = 1250 1 0 0
            key = 2000 0.2 0 0
            key = 2500 0.1 0 0
            key = 3500 0.01 0 0
        }
        UseSpecialistBonus = true
        SpecialistBonusBase = 1
        SpecialistEfficiencyFactor = 0.1
        EfficiencyBonus = 1
        ExperienceEffect = ConverterSkill
        INPUT_RESOURCE
        {
            ResourceName = EnrichedUranium
            Ratio = 0.0000125 // 1 unit of fuel is 80,000 seconds or approx 22.2 hours
            FlowMode = STAGE_PRIORITY_FLOW
        }
        OUTPUT_RESOURCE
        {
            ResourceName = DepletedFuel // = DepletedUranium, remove the '= DepletedFuel //' if you want it to produce DepletedUranium instead
            Ratio = 0.0000125
            DumpExcess = true
            FlowMode = STAGE_PRIORITY_FLOW
        }
        OUTPUT_RESOURCE
        {
            ResourceName = ElectricCharge
            Ratio = 1250
            DumpExcess = false
        }
    }
    
    MODULE
    {
        name = ModuleCoreHeat
        CoreTempGoal = 1250
        CoreToPartRatio = 0.5
        CoreEnergyMultiplier = 0.2
        CoreTempGoalAdjustment = 0
        HeatRadiantMultiplier = 0.085
        CoolingRadiantMultiplier = 0
        HeatTransferMultiplier = 0
        CoolantTransferMultiplier = 0.01
        radiatorCoolingFactor = 1
        radiatorHeatingFactor = 0.085
        CoreShutdownTemp = 1600
        MaxCoolant = 12500
        MaxCalculationWarp = 1000
        // I have no idea if these values are accurate or balanced, but in testing they worked and the reactor shut down before exploding anything, so probablly leave it as is unless you know what you are doing.
    }
}