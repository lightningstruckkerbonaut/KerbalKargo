PART
{
	// basic information
	// identifier
	name = KerbalKargoCompactContainer3m
	module = Part
	author = lightningstruckkerbonaut
	TechRequired = advConstruction
	entryCost = 3250
	cost = 1000
	category = Cargo
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/CC03compactcontainer
		position = 0.0, 0.0, 0.0
		scale = 0.9615,1.2,0.9615
		rotation = 0, -90, 0
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = CC-03 Compact Container
	manufacturer = Kerbal Kargo Inc
	description = A 1.25 by 3m octagonal container for storing medium amounts of cargo or resources. The researchers at Kerbal Kargo had to make an exceedingly difficult choice: developing smaller containers, because the public was protesting outside the KK headquarters chanting 'Bigger is not always better!'
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,1,1,1,0
	bulkheadProfiles = size2
	// information
	mass = 0.5
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 1600
	skinMaxTemp = 2400
	tags = shipping box container cargo short kerbalkargo Kerbalkargo KerbalKargo CC-03 CC
	breakingForce = 210
	breakingTorque = 210
	// node stuff here. y for length, xz for width or height im pretty sure
	// definition format is Position X, Position Y, Position Z, Up X, Up Y, Up Z
	node_stack_bottom = 0.0, 0.0, -0.61, 0.0, 0.0, -1.0, 1
	node_stack_top = 0.0, 0.0, 0.61, 0.0, 0.0, 1.0, 1
	node_stack_front = 0.0, 1.5, 0.0, 0.0, 1.0, 0.0, 1
	node_stack_back = 0.0, -1.5, 0.0, 0.0, -1.0, 0.0, 1
	node_attach = 0.0, 0.0, 0.6, 0.0, 0.0, -1.0, 1
	MODULE
    {

        name = ModuleInventoryPart      
        InventorySlots = 15
        packedVolumeLimit = 4500

    } 
	//color switch
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = CC03colorswitch
		switcherDescription = Container Color
		
		SUBTYPE
		{
			name = CC03Green
			title = Green
			primaryColor = #537439
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/container125green
			}
		}
		
		SUBTYPE
		{
			name = CC03Red
			title = Red
			primaryColor = #FF0000
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCRed
			}
		}

		SUBTYPE
		{
			name = CC03Blue
			title = Blue
			primaryColor = #366f9b
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCBlue
			}
		}

		SUBTYPE
		{
			name = CC03Orange
			title = Orange
			primaryColor = #FFA500
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCOrange
			}
		}

		SUBTYPE
		{
			name = CC03Yellow
			title = Yellow
			primaryColor = #cfc838
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCYellow
			}
		}

		SUBTYPE
		{
			name = CC03Brown
			title = Brown
			primaryColor = #9b7936
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCBrown
			}
		}

		SUBTYPE
		{
			name = CC03Gray
			title = Gray
			primaryColor = #808080
			TEXTURE
			{
				texture = KerbalKargo/Parts/Containers/CCGray
			}
		}
	}
	// resource switch
	MODULE
	{
		name = ModuleB9PartSwitch
		moduleID = CCResourceSwitch03
		switcherDescription = Container Contents
		baseVolume = 4500

		SUBTYPE
		{
			name = CC03Empty
			title = Cargo
			tankType = KerbalKargoStructural
			addedMass = 0
			addedCost = 0
			// makes inventory have full capacity again
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 4500
					InventorySlots = 15
				}
			}
		}
		// MODULE is just MODULE, Identifier shows which module its gonna modify, and DATA actually has the data thats gonna be the substitute, in this case it replaces the packed volume limit and inventory slots (9 and 2000) with 0 and 0
		SUBTYPE
		{
			name = CC03Ore
			title = Ore
			tankType = KerbalKargoOreContainer
			addedMass = 0
			addedCost = 250
			MODULE
			{
				IDENTIFIER
				{
					name = ModuleInventoryPart
				}
				DATA
				{
					packedVolumeLimit = 0
					InventorySlots = 0
				}
			}
		}
	}
}