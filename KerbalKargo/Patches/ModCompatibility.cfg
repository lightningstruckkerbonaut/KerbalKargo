@PART[KerbalKargoGasContainer*]:NEEDS[CommunityResourcePack]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[GasContainerContents]]
    {
       SUBTYPE
       {
        name = OxygenGasContainerKK
		title = Oxygen
		tankType = OxygenKK
		addedMass = 0
		addedCost = 0
       }
       SUBTYPE
       {
        name = WaterGasContainerKK
		title = Water
		tankType = WaterKK
		addedMass = 0
		addedCost = 0
       }
       SUBTYPE
       {
        name = ArgonGasContainerKK
		title = Argon
		tankType = ArgonKK
		addedMass = 0
		addedCost = 0
       }
    }
}
