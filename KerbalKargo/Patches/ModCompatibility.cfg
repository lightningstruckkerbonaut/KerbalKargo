// -----------------------------
// RC 06
// -----------------------------
PART:NEEDS[CommunityResourcePack]
{
	// This part is meant to only be accessible ingame if the player has CRP. If you have CRP but dont have a mod that actually gives the radioactive materials a use... congrats on your brand new shiny metal box!
	// basic information
	// identifier
	name = KerbalKargoRadioactiveCask6m
	module = Part
	author = lightningstruckkerbonaut
	TechRequired = nuclearPropulsion
	entryCost = 125000
	cost = 916625
	category = FuelTank
	subcategory = 0
	// the model for the part or it doesnt work
	MODEL
	{
		model = KerbalKargo/Parts/Containers/RC06radioactivecask
		position = 0.0, 0.0, 0.0
		scale = 1,1,1
		rotation = -90, 0, 0
	}

	rescaleFactor = 1.0

	// name that shows up in vab or sph
	title = RC-06 Radioactive Cask
	manufacturer = Kerbal Kargo Inc
	description = A 2.5 by 6m reinforced cask designed to carry radioactive materials such as enriched uranium, actinides and depleted nuclear fuel. Due to its design, it can only be attached to from 4 sides, and to the despair of Kerbal Kargo researchers, Kerbal safety regulations forced its design to be as safe as possible, leading to elevated cost and mass.
	// attachment rules: stack, srfAttach, allowStack, allowSrfAttach, allowCollision
	attachRules = 1,0,1,1,0
	bulkheadProfiles = size2
	// information
	mass = 2.5
	dragModelType = default
	maximum_drag = 0.40
	minimum_drag = 0.40
	angularDrag = 4
	crashTolerance = 15
	maxTemp = 2000
	skinMaxTemp = 2400
	tags = shipping nuclear container cargo cask kerbalkargo Kerbalkargo KerbalKargo radioactive RC-06
	breakingForce = 210
	breakingTorque = 210
	// node stuff here. note: i am pretty sure that since the cfg applies rotation to the model, x is width, y is length, z is height (probably)
	// definition format is Position X wide, Position Y up, Position Z long, Up X, Up Y, Up Z
	node_stack_bottom = 0.0, 0.0, -1.25, 0.0, 0.0, -1.0, 2
	node_stack_top = 0.0, 0.0, 1.25, 0.0, 0.0, 1.0, 2
	node_stack_front = 0.0, 3.0, 0.0, 0.0, 1.0, 0.0, 2
	node_stack_back = 0.0, -3.0, 0.0, 0.0, -1.0, 0.0, 2
	node_attach = 0.0, 0.0, 1.25, 0.0, 0.0, 1.0, 1
	
	RESOURCE
	{
		name = EnrichedUranium
		amount = 0
		maxAmount = 1025
	}
	RESOURCE
	{
		name = DepletedFuel
		amount = 0
		maxAmount = 1025
	}
}
