// -----------------------------
// RC 06 and 03
// -----------------------------
@PART[KerbalKargoRadioactiveCask*]:NEEDS[CommunityResourcePack]
{
	@TechRequired = nuclearPropulsion
	
	&RESOURCE[EnrichedUranium]
	{
		amount = 0
		maxAmount = 1025
	}
	
	&RESOURCE[DepletedFuel]
	{
		amount = 0
		maxAmount = 1025
	}
}
// -----------------------------
// GC tanks
// -----------------------------
@PART[KerbalKargoGasContainer*]:NEEDS[Kerbalism|TacLifeSupport]
{
    @MODULE[ModuleB9PartSwitch]:HAS[#moduleID[GasContainerContents*]]
    {
       SUBTYPE
       {
        name = OxygenGasContainerKK
		title = Oxygen
		tankType = OxygenKK
		descriptionSummary = Breathe oxygen!
		addedMass = 0
		addedCost = 0
       }
       SUBTYPE
       {
        name = WaterGasContainerKK
		title = Water
		tankType = WaterKK
		descriptionSummary = Drink water!
		addedMass = 0
		addedCost = 0
       }
       SUBTYPE
       {
        name = ArgonGasContainerKK
		title = Argon
		tankType = ArgonKK
		descriptionSummary = Do not breathe argon!
		addedMass = 0
		addedCost = 0
       }
    }
}
