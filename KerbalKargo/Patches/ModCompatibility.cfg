		addedCost = 0
       }
       SUBTYPE
       {
        name = WaterContainerKK
		title = Water
		descriptionSummary = Bottles of water
		tankType = WaterKK
		addedMass = 0
		addedCost = 0
       }
       SUBTYPE
       {
        name = FoodContainerKK
